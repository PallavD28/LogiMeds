version: "3.9"

services:
  db:
    image: postgres:15
    container_name: logimeds_db
    environment:
      POSTGRES_USER: logimeds
      POSTGRES_PASSWORD: logimeds
      POSTGRES_DB: logimeds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logimeds"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: logimeds_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
    - ./backend/.env
    environment:
      DATABASE_URL: postgresql://logimeds:logimeds@db:5432/logimeds

volumes:
  postgres_data: